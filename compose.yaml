services:

  # Neo4j — always started. `docker compose up` brings up just this.
  # Browser UI: http://localhost:7474  (bolt on 7687)
  neo4j:
    image: 'neo4j:5-community'
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-argusgraph-dev}
    ports:
      - '7474:7474'   # HTTP / browser
      - '7687:7687'   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # RabbitMQ — broker for the ingest worker pipeline.
  # Management UI: http://localhost:15672 (credentials from .env)
  rabbitmq:
    image: 'rabbitmq:4-management'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - '5672:5672'     # AMQP
      - '15672:15672'   # management UI
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Backend — behind the `app` profile so infra can come up without it.
  # Run everything:  docker compose --profile app up --build
  app:
    build: .
    profiles: [ "app" ]
    depends_on:
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-argusgraph-dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - '8080:8080'

volumes:
  neo4j_data:
