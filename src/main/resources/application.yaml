spring:
  application:
    name: argusgraph

  # RFC 9457 problem+json error bodies (see GlobalExceptionHandler).
  mvc:
    problemdetails:
      enabled: true

  # ── Neo4j ────────────────────────────────────────────────────────────────────
  # Everything is env-driven with localhost defaults so it runs out of the box
  # against the `neo4j` service in compose.yaml. Uniqueness constraints are
  # created at startup by the graph module's GraphSchemaInitializer.
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:argusgraph-dev}

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  # Env-driven with localhost defaults matching the `rabbitmq` service in compose.yaml.
  # Listener retry: 3 attempts with backoff, then reject without requeue → the message
  # dead-letters to ingest.osv.dlq (topology declared in IngestAmqpConfig).
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # Status endpoint probes queue depths every dashboard poll — a blackholed broker
    # must fail fast, not block Tomcat threads for the client default of 60 s.
    connection-timeout: 3s
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-retries: 5          # 1 initial attempt + 5 retries = 6 total deliveries (Boot 4 renamed max-attempts)
          initial-interval: 1s
          multiplier: 3
          max-interval: 10s
        concurrency: 4
        max-concurrency: 8
        prefetch: 10

  # ── Projects datasource (H2) ─────────────────────────────────────────────────
  # Imported SBOM projects live OUTSIDE the graph in an embedded H2 file. Tests
  # override to in-memory. Schema bootstraps from schema.sql (IF NOT EXISTS).
  datasource:
    url: ${PROJECTS_DB_URL:jdbc:h2:file:./data/projects}
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  # We start compose manually; don't let Spring auto-manage it.
  docker:
    compose:
      enabled: false

# ── App config (bound to AppProperties) ───────────────────────────────────────
app:
  base-url: ${BASE_URL:http://localhost:8080}

# ── Server ─────────────────────────────────────────────────────────────────────
server:
  port: 8080
  shutdown: graceful

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
# Swagger UI:  http://localhost:8080/swagger-ui.html
# OpenAPI doc: http://localhost:8080/v3/api-docs
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    dev.argusgraph: DEBUG
    org.springframework: INFO

# ── Ingest worker ─────────────────────────────────────────────────────────────
# OSV dump source for the fetch worker (POST /api/v1/ingest/jobs/osv). Override in tests
# or to point at a mirror; the default is the public OSV GCS bucket.
argus:
  ingest:
    osv:
      base-url: ${OSV_BASE_URL:https://osv-vulnerabilities.storage.googleapis.com}
